<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receitas da Casa</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script>
      // Esta página (home) pode ser navegada sem login.
      // Deve ser declarado ANTES de incluir o login.js.
      var REQUIRE_LOGIN = false;
    </script>
    <script src="./assets/js/login.js"></script>
    <script src="./assets/js/app.js" defer></script>
  </head>
  <body>
    <header>
      <div class="banner">
        <img src="./assets/images/banner_ti.png" alt="" />
      </div>
      <div class="barra-info">
        <nav class="menu">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="favoritos.html">Meus Favoritos</a></li>
            <li><a href="about.html">Sobre nós</a></li>
          </ul>
        </nav>
        <div class="dados-usuario">
          <span id="userInfo"></span>
        </div>
      </div>
    </header>
    <main>
      <h3>Receitas da Casa</h3>
      <p>Navegue pelas nossas receitas e clique no coração para favoritar as que você mais gosta. É necessário estar logado para favoritar.</p>

      <div class="filtro-area mb-3">
        <label for="filtroCategoria"><strong>Filtrar por categoria:</strong></label>
        <select id="filtroCategoria" class="form-select" style="max-width: 260px; display:inline-block;">
          <option value="todas">Todas</option>
          <option value="Entradas">Entradas</option>
          <option value="Pratos principais">Pratos principais</option>
          <option value="Massas">Massas</option>
          <option value="Lanches">Lanches</option>
          <option value="Sobremesas">Sobremesas</option>
        </select>
      </div>

      <div id="listaCards" class="row">
        <p>Carregando receitas...</p>
      </div>
    </main>
  </body>
</html>
